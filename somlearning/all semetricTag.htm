HTML Semantic Tags Easy Chart
Tag        	Meaning	       Use
<header>	Top section	Logo, title, intro
<nav>	Navigation	Menus, links
<main>	Main content	Primary page content
<section>	Content section	Chapters, grouped topics
<article>	Independent content	Blog post, news article
<aside>	Side content	Sidebar, ads, related links
<footer>	Bottom section	Copyright, contact
<figure>	Media container	Image, diagram, chart
<figcaption>	Caption for figure	Image text
<details>	Expand/collapse box	FAQs
<summary>	Title of details	Clickable heading
<mark>	Highlight text	Marked words
<time>	Date/time value	Events, schedule
<address>	Contact info	Author/company address
